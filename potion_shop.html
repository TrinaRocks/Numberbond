<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Potion Shop 🧪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0e0818;font-family:'Trebuchet MS',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#e0d0ff;user-select:none;}
#app{width:100%;max-width:560px;}
#config-screen{padding:22px;}
#config-screen h1{text-align:center;font-size:24px;color:#c080ff;margin-bottom:4px;}
.subtitle{text-align:center;color:#7050a0;font-size:13px;margin-bottom:16px;}
.config-cols{display:flex;gap:20px;}
.config-col{flex:1;}
.radio-group{margin-bottom:12px;}
.radio-group .gt{display:block;font-size:13px;font-weight:bold;color:#e0d0ff;margin-bottom:4px;}
.radio-group label{display:flex;align-items:center;gap:7px;font-size:12px;color:#c0b0e0;padding:2px 0 2px 12px;cursor:pointer;}
.radio-group input[type=radio]{accent-color:#c080ff;}
#start-btn{display:block;margin:18px auto 0;background:#8040c0;color:#f0e0ff;border:none;padding:10px 36px;font-size:16px;font-weight:bold;border-radius:6px;cursor:pointer;font-family:inherit;}
#start-btn:hover{background:#a050e0;}
#game-screen{display:none;flex-direction:column;align-items:center;}
#top-bar{display:flex;width:100%;align-items:center;padding:8px 14px 4px;gap:10px;}
#score-label{font-size:13px;font-weight:bold;flex:1;}
#streak-label{font-size:13px;font-weight:bold;color:#c0a0ff;}
#settings-btn{background:#1e0838;color:#c0b0e0;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;}
canvas#gc{display:block;width:560px;height:380px;max-width:100vw;}
.canvas-wrap{position:relative;width:560px;max-width:100vw;}
#feedback-label{font-size:14px;text-align:center;min-height:22px;padding:3px 0;font-weight:bold;}
#shelf-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:8px 12px;min-height:70px;width:100%;}
.bottle-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform 0.12s;padding:4px 6px;border-radius:8px;border:2px solid transparent;background:rgba(255,255,255,0.04);}
.bottle-btn:hover{transform:scale(1.12);border-color:#c080ff;}
.bottle-btn:active{transform:scale(0.95);}
.bottle-btn canvas{display:block;}
.bottle-num{font-size:14px;font-weight:bold;color:#e0d0ff;margin-top:2px;}
#action-row{display:flex;gap:12px;justify-content:center;padding:4px 0 10px;}
.act-btn{padding:8px 20px;font-size:14px;font-weight:bold;border:none;border-radius:5px;cursor:pointer;font-family:inherit;}
#clear-btn{background:#3a1060;color:#d0b0ff;}
#clear-btn:hover{background:#5a2080;}
#skip-btn{background:#1e0838;color:#9080b0;}
#skip-btn:hover{background:#2e1048;}
</style>
</head>
<body>
<div id="app">
<div id="config-screen">
  <h1>🧪 Potion Shop</h1>
  <p class="subtitle">Help the wizard fill their order!</p>
  <div class="config-cols">
    <div class="config-col">
      <div class="radio-group">
        <span class="gt">🔮 Level</span>
        <label><input type="radio" name="level" value="to5" checked> Bonds to 5</label>
        <label><input type="radio" name="level" value="exact10"> Bonds to 10</label>
        <label><input type="radio" name="level" value="doubles10"> Doubles to 10</label>
        <label><input type="radio" name="level" value="upto10"> Bonds up to 10</label>
        <label><input type="radio" name="level" value="exact20"> Bonds to 20</label>
        <label><input type="radio" name="level" value="doubles20"> Doubles to 20</label>
        <label><input type="radio" name="level" value="upto20"> Bonds up to 20</label>
      </div>
    </div>
    <div class="config-col">
      <div class="radio-group">
        <span class="gt">➕➖ Question type</span>
        <label><input type="radio" name="mode" value="add"> Fill the cauldron</label>
        <label><input type="radio" name="mode" value="sub"> Find missing amount</label>
        <label><input type="radio" name="mode" value="both" checked> Mixed</label>
      </div>
      <div class="radio-group">
        <span class="gt">🔊 Sound</span>
        <label><input type="radio" name="sound" value="on"> On</label>
        <label><input type="radio" name="sound" value="off" checked> Off</label>
      </div>
    </div>
  </div>
  <button id="start-btn">▶ Start</button>
</div>
<div id="game-screen">
  <div id="top-bar">
    <span id="score-label">⭐ 0 / 0</span>
    <span id="streak-label"></span>
    <button id="settings-btn">⚙ Settings</button>
  </div>
  <div class="canvas-wrap"><canvas id="gc" width="560" height="380"></canvas></div>
  <div id="feedback-label"></div>
  <div id="shelf-row"></div>
  <div id="action-row">
    <button class="act-btn" id="clear-btn">↩ Empty cauldron</button>
    <button class="act-btn" id="skip-btn">Skip →</button>
  </div>
</div>
</div>
<script>
// ── BOND ENGINE (minimal random) ──────────────────────────────────────────
function BE_bondsExactly(w){const b=[];for(let a=1;a<=Math.floor(w/2);a++)b.push([w,a]);return b;}
function BE_bondsUpTo(m){let r=[];for(let w=2;w<=m;w++)r=r.concat(BE_bondsExactly(w));return r;}
function BE_bondsDoublesOnly(m){const r=[];for(let w=2;w<=m;w+=2)r.push([w,w/2]);return r;}
const BE_LEVEL_BONDS={to5:()=>BE_bondsUpTo(5),exact10:()=>BE_bondsExactly(10),doubles10:()=>BE_bondsDoublesOnly(10),upto10:()=>BE_bondsUpTo(10),exact20:()=>BE_bondsExactly(20),doubles20:()=>BE_bondsDoublesOnly(20),upto20:()=>BE_bondsUpTo(20)};
class BondEngine{constructor(c){this.level=c.level||'upto10';this.mode=c.mode||'both';this._bonds=(BE_LEVEL_BONDS[this.level]||BE_LEVEL_BONDS['upto10'])();this._lastQ=null;}nextQuestion(){const[w,a]=this._bonds[Math.floor(Math.random()*this._bonds.length)];const b=w-a;let pa=a,pb=b;if(Math.random()<0.5)[pa,pb]=[pb,pa];let miss;if(this.mode==='add')miss='whole';else if(this.mode==='sub')miss=Math.random()<0.5?'partA':'partB';else{const r=Math.random();miss=r<0.34?'whole':r<0.67?'partA':'partB';}const q={whole:w,partA:pa,partB:pb,missing:miss,correctAnswer:miss==='whole'?w:miss==='partA'?pa:pb};if(this._lastQ&&this._bonds.length>1&&q.whole===this._lastQ.whole&&q.partA===this._lastQ.partA&&q.partB===this._lastQ.partB&&q.missing===this._lastQ.missing)return this.nextQuestion();this._lastQ=q;return q;}recordAnswer(){}}

// ── SOUND ──────────────────────────────────────────────────────────────────
let audioCtx=null;
function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTones(notes,vol=0.35){try{const c=getACtx();let t=c.currentTime;notes.forEach(([f,ms])=>{if(f===0){t+=ms/1000;return;}const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+ms/1000);o.start(t);o.stop(t+ms/1000);t+=ms/1000;});}catch(e){}}
const SOUNDS={pour:()=>playTones([[200,60],[180,80],[160,100]],0.25),correct:()=>playTones([[400,80],[500,80],[700,140]]),wrong:()=>playTones([[300,80],[220,160]],0.3),levelup:()=>playTones([[523,80],[659,80],[784,80],[1047,200]])};

// ── CANVAS ─────────────────────────────────────────────────────────────────
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=560,H=380;
function resizeCanvas(){const sc=Math.min(1,window.innerWidth/560);canvas.style.width=(560*sc)+'px';canvas.style.height=(380*sc)+'px';canvas.parentElement.style.width=(560*sc)+'px';}
window.addEventListener('resize',resizeCanvas);

// ── BOTTLE PALETTES ────────────────────────────────────────────────────────
const BOTTLE_PALETTES=[null,['#ff4060','#ff80a0'],['#ff8020','#ffb060'],['#f0d000','#ffe060'],['#40c040','#80e080'],['#20c0a0','#60e0c0'],['#2080ff','#60b0ff'],['#8040ff','#c080ff'],['#ff40c0','#ff80e0'],['#40e0e0','#80ffff'],['#ff6040','#ff9070'],['#c0ff40','#e0ff80'],['#ff40ff','#ff80ff'],['#4040ff','#8080ff'],['#ff8040','#ffc080'],['#00e060','#60ffa0'],['#e04040','#ff8080'],['#40c0ff','#80e0ff'],['#c0a040','#e0d080'],['#a040c0','#d080f0'],['#ffffff','#e0e0e0']];

function drawBottleSprite(c2,x,y,value,w,h){
  const pal=BOTTLE_PALETTES[Math.min(value,20)]||['#8080ff','#c0c0ff'];
  const[body,shine]=pal;const cx=x+w/2;
  c2.fillStyle='#c09050';c2.beginPath();c2.roundRect(cx-5,y,10,10,2);c2.fill();
  c2.fillStyle='#a07030';c2.beginPath();c2.roundRect(cx-5,y+8,10,4,1);c2.fill();
  c2.fillStyle=body;c2.beginPath();c2.roundRect(cx-6,y+10,12,12,2);c2.fill();
  c2.fillStyle=body;c2.beginPath();c2.roundRect(x+2,y+20,w-4,h-22,[0,0,6,6]);c2.fill();
  const fH=(h-26)*0.82;
  c2.fillStyle=body;c2.globalAlpha=0.7;c2.beginPath();c2.roundRect(x+4,y+22+(h-26-fH),w-8,fH,[0,0,5,5]);c2.fill();c2.globalAlpha=1;
  c2.fillStyle=shine;c2.globalAlpha=0.5;c2.beginPath();c2.ellipse(cx-5,y+28,3,10,-0.3,0,Math.PI*2);c2.fill();c2.globalAlpha=1;
  c2.strokeStyle='rgba(255,255,255,0.2)';c2.lineWidth=1;c2.beginPath();c2.roundRect(x+2,y+20,w-4,h-22,[0,0,6,6]);c2.stroke();
}

// ── STATE ──────────────────────────────────────────────────────────────────
let cfg={},engine=null,score=0,total=0,streak=0;
let currentQ=null,correctAns=0,poured=[],pourAnim=0,pourAnimId=null,revealId=null,flashWrong=false;

// ── DRAW ───────────────────────────────────────────────────────────────────
function drawBackground(){
  const g=ctx.createRadialGradient(W/2,H/2,30,W/2,H/2,W*0.8);
  g.addColorStop(0,'#1a0828');g.addColorStop(1,'#07030e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){const sx=(i*137+23)%W,sy=(i*89+17)%H,sr=0.5+((i*31)%3)*0.5;ctx.fillStyle=`rgba(255,220,255,${0.2+((i*17)%5)*0.12})`;ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();}
}

function drawCauldron(){
  const cx=W/2,cy=240,cw=130,ch=90;
  ctx.fillStyle='#302030';
  [[-50,30],[0,36],[50,30]].forEach(([ox,oh])=>{ctx.beginPath();ctx.moveTo(cx+ox-8,cy+ch/2-4);ctx.lineTo(cx+ox+8,cy+ch/2-4);ctx.lineTo(cx+ox+5,cy+ch/2+oh);ctx.lineTo(cx+ox-5,cy+ch/2+oh);ctx.closePath();ctx.fill();});
  const bg=ctx.createRadialGradient(cx-20,cy-10,10,cx,cy,cw*0.7);
  bg.addColorStop(0,'#504060');bg.addColorStop(1,'#201828');
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(cx,cy,cw,ch*0.85,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#706080';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,cy,cw,ch*0.85,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#605070';ctx.beginPath();ctx.ellipse(cx,cy-ch*0.5,cw,ch*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#907090';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(cx,cy-ch*0.5,cw,ch*0.18,0,0,Math.PI*2);ctx.stroke();
  const pourTotal=poured.reduce((a,b)=>a+b.value,0);
  const fillFrac=correctAns>0?Math.min(pourTotal/correctAns,1):0;
  const liqH=ch*0.7*fillFrac;
  if(liqH>2){
    const liqY=cy+ch*0.3-liqH;
    const liqCol=flashWrong?'#ff4020':'#8040d0';
    const liqCol2=flashWrong?'#ff8060':'#c080ff';
    const lg=ctx.createLinearGradient(0,liqY,0,liqY+liqH);
    lg.addColorStop(0,liqCol2);lg.addColorStop(1,liqCol);
    ctx.fillStyle=lg;ctx.save();
    ctx.beginPath();ctx.ellipse(cx,cy,cw-6,ch*0.82,0,0,Math.PI*2);ctx.clip();
    ctx.fillRect(cx-cw,liqY,cw*2,liqH+ch*0.3);ctx.restore();
    ctx.fillStyle=liqCol2;ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.ellipse(cx,liqY,cw-8,ch*0.14,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  if(pourAnim>0){
    for(let b=0;b<6;b++){const bx=cx+(-50+b*20)+Math.sin(pourAnim*8+b)*6,by=cy-ch*0.4-pourAnim*40-b*8;ctx.fillStyle=`rgba(180,120,255,${0.6-pourAnim*0.3})`;ctx.beginPath();ctx.arc(bx,by,4+b*1.5,0,Math.PI*2);ctx.fill();}
  }
  if(poured.length>0){const runT=poured.reduce((a,b)=>a+b.value,0);ctx.fillStyle='#e0d0ff';ctx.font='bold 22px Trebuchet MS';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(runT,cx,cy+8);}
}

function drawWizard(){
  const wx=70,wy=60;
  ctx.fillStyle='#3020a0';ctx.beginPath();ctx.moveTo(wx,wy+20);ctx.lineTo(wx-25,wy+100);ctx.lineTo(wx+25,wy+100);ctx.closePath();ctx.fill();
  ctx.fillStyle='#c0a0ff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('✦',wx-8,wy+50);ctx.fillText('✦',wx+8,wy+70);
  ctx.fillStyle='#e8c0a0';ctx.beginPath();ctx.arc(wx,wy,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3020a0';ctx.beginPath();ctx.moveTo(wx-22,wy-12);ctx.lineTo(wx+22,wy-12);ctx.lineTo(wx,wy-60);ctx.closePath();ctx.fill();
  ctx.fillStyle='#5040c0';ctx.beginPath();ctx.ellipse(wx,wy-12,24,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#201030';ctx.beginPath();ctx.arc(wx-6,wy,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(wx+6,wy,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.ellipse(wx,wy+14,10,8,0,0,Math.PI);ctx.fill();
  drawSpeechBubble(wx,wy);
}

function drawSpeechBubble(wx,wy){
  if(!currentQ)return;
  const{whole:w,partA:a,partB:b,missing:m}=currentQ;
  let l1='',l2='';
  if(m==='whole'){l1=`I need ${a} + ${b}`;l2='potions please!';}
  else if(m==='partA'){l1=`I need ${w} potions.`;l2=`I have ${b}. Fill to ${w}?`;}
  else{l1=`I need ${w} potions.`;l2=`I have ${a}. Fill to ${w}?`;}
  const bx=110,by=30,bw=190,bh=52;
  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
  ctx.strokeStyle='#c080ff';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();ctx.moveTo(bx,by+20);ctx.lineTo(wx+20,wy-5);ctx.lineTo(bx+12,by+14);ctx.closePath();ctx.fill();
  ctx.fillStyle='#301040';ctx.font='bold 13px Trebuchet MS';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(l1,bx+8,by+8);
  ctx.font='12px Trebuchet MS';ctx.fillText(l2,bx+8,by+28);
}

function drawTargetIndicator(){
  if(!currentQ)return;
  const cx=W/2,total2=poured.reduce((a,b)=>a+b.value,0),needed=correctAns-total2;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(cx-100,308,200,36,8);ctx.fill();
  if(needed>0){ctx.fillStyle='#d0b0ff';ctx.font='14px Trebuchet MS';ctx.fillText(`Still need: ${needed} more`,cx,326);}
  else if(needed===0&&total2>0){ctx.fillStyle='#80ff80';ctx.font='bold 15px Trebuchet MS';ctx.fillText(`✓ Total = ${total2}`,cx,326);}
  else{ctx.fillStyle='#c0c0c0';ctx.font='14px Trebuchet MS';ctx.fillText(`Target: ${correctAns}`,cx,326);}
  for(let i=0;i<correctAns&&i<20;i++){const dx=cx-correctAns*7+i*14+7;ctx.fillStyle=i<total2?'#c080ff':'rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(dx,352,5,0,Math.PI*2);ctx.fill();}
}

function redraw(){ctx.clearRect(0,0,W,H);drawBackground();drawCauldron();drawWizard();drawTargetIndicator();}

// ── SHELF ──────────────────────────────────────────────────────────────────
function buildShelf(){
  const shelf=document.getElementById('shelf-row');shelf.innerHTML='';
  const maxVal=currentQ?Math.max(currentQ.whole,5):10;
  for(let v=1;v<=maxVal;v++){
    const wrap=document.createElement('div');wrap.className='bottle-btn';
    const bc=document.createElement('canvas');bc.width=36;bc.height=56;
    drawBottleSprite(bc.getContext('2d'),0,0,v,36,56);wrap.appendChild(bc);
    const num=document.createElement('div');num.className='bottle-num';num.textContent=v;wrap.appendChild(num);
    wrap.onclick=()=>pourBottle(v);shelf.appendChild(wrap);
  }
}

function pourBottle(v){
  const run=poured.reduce((a,b)=>a+b.value,0)+v;
  const pal=BOTTLE_PALETTES[Math.min(v,20)]||['#8080ff','#c0c0ff'];
  poured.push({value:v,colour:pal[0]});snd('pour');
  pourAnim=1;if(pourAnimId)clearInterval(pourAnimId);
  pourAnimId=setInterval(()=>{pourAnim-=0.08;if(pourAnim<=0){pourAnim=0;clearInterval(pourAnimId);pourAnimId=null;}redraw();},40);
  if(run===correctAns){setTimeout(()=>onCorrect(),200);}
  else if(run>correctAns){flashWrong=true;redraw();setTimeout(()=>{flashWrong=false;poured=[];pourAnim=0;redraw();},700);onWrong();}
  else{redraw();}
}

// ── GAME FLOW ──────────────────────────────────────────────────────────────
function snd(n){if(cfg.sound==='on'&&SOUNDS[n])SOUNDS[n]();}
function setFeedback(msg,col){const el=document.getElementById('feedback-label');el.textContent=msg;el.style.color=col;}
function updateScore(){document.getElementById('score-label').textContent=`⭐ ${score}/${total}`;}

function newQuestion(){
  if(revealId){clearTimeout(revealId);revealId=null;}
  poured=[];pourAnim=0;flashWrong=false;setFeedback('','#fff');
  currentQ=engine.nextQuestion();correctAns=currentQ.correctAnswer;
  buildShelf();updateScore();redraw();
}

function onCorrect(){
  score++;streak++;total++;engine.recordAnswer();
  snd(streak>=5?'levelup':'correct');
  const msgs=['✓ Order filled! 🧪','✓ Perfect potion! ✨','✓ The wizard is pleased! 🌟','✓ Excellent! 🔮'];
  setFeedback(msgs[Math.floor(Math.random()*msgs.length)],'#a0ff80');
  if(streak>1)document.getElementById('streak-label').textContent=`✨${streak} in a row!`;
  updateScore();revealId=setTimeout(newQuestion,1500);
}

function onWrong(){
  streak=0;total++;engine.recordAnswer();
  document.getElementById('streak-label').textContent='';snd('wrong');
  setFeedback('Too much! The cauldron overflows…','#ff6050');updateScore();
}

function skipQuestion(){
  streak=0;total++;engine.recordAnswer();
  document.getElementById('streak-label').textContent='';
  poured=[];pourAnim=0;flashWrong=false;setFeedback('','#fff');updateScore();newQuestion();
}

// ── START / SETTINGS ───────────────────────────────────────────────────────
function getRadio(n){return document.querySelector(`input[name="${n}"]:checked`)?.value;}

document.getElementById('start-btn').onclick=()=>{
  cfg={level:getRadio('level'),mode:getRadio('mode'),sound:getRadio('sound')};
  engine=new BondEngine({level:cfg.level,mode:cfg.mode});
  score=0;total=0;streak=0;
  document.getElementById('streak-label').textContent='';
  document.getElementById('config-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  resizeCanvas();newQuestion();
};
document.getElementById('settings-btn').onclick=()=>{document.getElementById('game-screen').style.display='none';document.getElementById('config-screen').style.display='block';};
document.getElementById('clear-btn').onclick=()=>{poured=[];pourAnim=0;flashWrong=false;setFeedback('','#fff');redraw();};
document.getElementById('skip-btn').onclick=skipQuestion;

resizeCanvas();
</script>
</body>
</html>
